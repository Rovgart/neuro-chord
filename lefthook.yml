# lefthook.yml

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}"
      run: bunx @biomejs/biome check --apply --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  commands:
    backend-tests:
      root: "apps/neuro-chord-backend/"
      run: bun test
    frontend-linter:
      root: "apps/mobile/"
      run: bunx @biomejs/biome check .