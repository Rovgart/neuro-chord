services:
    db:
        image: postgres:15-alpine
        container_name: audio-app-db
        restart: always
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=audio_db
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        container_name: audio-app-redis
        restart: always
        ports:
            - "6379:6379"
        command: >
            redis-server
            --requirepass ${REDIS_PASSWORD}
            --maxmemory 256mb
            --maxmemory-policy allkeys-lru
            --save 60 1
            --loglevel warning
    mongo:
        image: mongo:latest
        container_name: audio-app-mongo
        restart: always
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
            - MONGO_INITDB_DATABASE=audio_db-mongo
        ports:
            - "27017:27017"
        volumes:
            - mongo_data:/data/db
    prometheus:
        image: prom/prometheus:latest
        container_name: audio-app-prometheus
        restart: always
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
    grafana:
        image: grafana/grafana:latest
        container_name: audio-app-grafana
        restart: always
        ports:
            - "8000:3000"
volumes:
    postgres_data:
    mongo_data:
